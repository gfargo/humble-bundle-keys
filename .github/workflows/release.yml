name: Release

# Triggered by pushing a tag like v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

# PyPI trusted publishing requires id-token write.
# contents:write lets us create a GitHub Release.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c "import tomllib,sys;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag pkg=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pkg"
            exit 1
          fi

      - name: Install build
        run: pip install build

      - name: Build
        run: python -m build

      - name: Smoke test the wheel
        run: |
          pip install dist/*.whl
          humble-bundle-keys --version
          humble-bundle-keys --help > /dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/p/humble-bundle-keys
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$tag" '
              /^## \[?[0-9]+\.[0-9]+\.[0-9]+\]?/ {
                if (found) exit;
                if (index($0, ver)) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md > release-notes.md
          else
            echo "Release v$tag" > release-notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
          generate_release_notes: true
